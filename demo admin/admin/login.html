<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Mahalaxmi Mobile Center</title>
  <link rel="icon" type="image/png" href="../assets/logo.png">
  <script src="../sheets-api.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-page { width: 100%; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">
          <span class="logo-letter">M</span>
          <img class="logo-img" src="" alt="">
        </div>
        <div>
          <div class="login-logo-text">Mahalaxmi Mobile Center</div>
          <div style="font-size: 12px; color: var(--text-muted);">Admin Panel</div>
        </div>
      </div>
      <h1>Sign in</h1>
      <p>Enter your credentials to access the admin dashboard</p>
      <div class="login-error" id="loginError">Invalid email or password</div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" class="form-control" placeholder="admin@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="login-btn" id="loginBtn">Sign in</button>
      </form>
    </div>
  </div>

  <script src="js/admin-app.js"></script>
</body>
</html>
