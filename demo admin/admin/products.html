<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Mahalaxmi Mobile Center Admin</title>
  <link rel="icon" type="image/png" href="../assets/logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
          <span class="logo-letter">M</span>
          <img class="logo-img" src="" alt="">
        </div>
      <div>
        <span>Mahalaxmi Mobile Center</span>
        <small>Admin Panel</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="sidebar-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="products.html" class="sidebar-link active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        Products
      </a>
      <a href="repairs.html" class="sidebar-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        Repairs
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-link" onclick="handleLogout()" style="width: 100%;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
    </div>
  </aside>

  <div class="main-content">
    <header class="admin-header">
      <div class="header-left">
        <button class="header-btn mobile-toggle" onclick="toggleSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1>Products</h1>
      </div>
      <div class="header-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="productSearchInput" placeholder="Search products..." oninput="filterProductsTable()">
      </div>
      <div class="header-right">
        <button class="header-btn" onclick="window.location.href='../index.html'" title="View site">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </button>
        <button class="header-btn theme-btn-admin" onclick="toggleAdminTheme()" title="Toggle theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <div class="admin-avatar">A</div>
      </div>
    </header>

    <div class="page-content">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">All Products</span>
          <div class="panel-actions">
            <select class="filter-select" id="productCategoryFilter" onchange="filterProductsTable()" style="width: auto;">
              <option value="all">All Categories</option>
              <option value="Mobile Phones">Mobile Phones</option>
              <option value="Refurbished Phones">Refurbished Phones</option>
              <option value="Second Hand Phones">Second Hand Phones</option>
              <option value="Accessories">Accessories</option>
            </select>
            <button class="btn btn-primary" onclick="openProductModal()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add Product
            </button>
          </div>
        </div>
        <div class="panel-body">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Image</th>
                  <th>Name</th>
                  <th>Brand</th>
                  <th>Category</th>
                  <th>Price</th>
                  <th>Stock</th>
                  <th>Featured</th>
                  <th>URL</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="productsTableBody">
                <tr><td colspan="9"><div class="loading-spinner"><div class="spinner"></div></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="productModal">
    <div class="modal" style="max-width: 600px;">
      <div class="modal-header">
        <span class="modal-title" id="productModalTitle">Add Product</span>
        <button class="modal-close" onclick="closeModal('productModal')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="productForm" onsubmit="saveProduct(event)">
          <input type="hidden" id="productId">
          <div class="form-row">
            <div class="form-group">
              <label for="productName">Product Name *</label>
              <input type="text" id="productName" class="form-control" required>
            </div>
            <div class="form-group">
              <label for="productBrand">Brand *</label>
              <select id="productBrand" class="form-control" required>
                <option value="">Select Brand</option>
                <option value="Samsung">Samsung</option>
                <option value="Apple">Apple</option>
                <option value="Xiaomi">Xiaomi</option>
                <option value="Vivo">Vivo</option>
                <option value="Oppo">Oppo</option>
                <option value="OnePlus">OnePlus</option>
                <option value="Realme">Realme</option>
                <option value="Nokia">Nokia</option>
                <option value="Huawei">Huawei</option>
                <option value="Nothing">Nothing</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="productCategory">Category *</label>
              <select id="productCategory" class="form-control" required>
                <option value="">Select Category</option>
                <option value="Mobile Phones">Mobile Phones</option>
                <option value="Refurbished Phones">Refurbished Phones</option>
                <option value="Second Hand Phones">Second Hand Phones</option>
                <option value="Accessories">Accessories</option>
              </select>
            </div>
            <div class="form-group">
              <label for="productImage">Image URL *</label>
              <input type="url" id="productImage" class="form-control" required>
              <div class="image-preview-wrap" id="productPreviewWrap">
                <img id="productPreviewImg" src="" alt="Preview">
                <div class="image-preview-actions">
                  <button class="btn btn-ghost btn-sm" type="button" onclick="document.getElementById('productImage').value='';document.getElementById('productPreviewWrap').classList.remove('has-image');">Remove</button>
                </div>
              </div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="productPrice">Price *</label>
              <input type="number" id="productPrice" class="form-control" step="0.01" required>
            </div>
            <div class="form-group">
              <label for="productOldPrice">Old Price</label>
              <input type="number" id="productOldPrice" class="form-control" step="0.01">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="productStock">Stock Status *</label>
              <select id="productStock" class="form-control" required>
                <option value="In Stock">In Stock</option>
                <option value="Out of Stock">Out of Stock</option>
              </select>
            </div>
            <div class="form-group">
              <label for="productFeatured">Featured</label>
              <select id="productFeatured" class="form-control">
                <option value="no">No</option>
                <option value="yes">Yes</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="productDescription">Description</label>
            <textarea id="productDescription" class="form-control" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label for="productUrl">Product URL (for Quick View)</label>
            <input type="url" id="productUrl" class="form-control" placeholder="https://...">
          </div>
          <div class="form-group">
            <label for="productSpecs">Specifications (for Enquiry)</label>
            <textarea id="productSpecs" class="form-control" rows="4" placeholder="Enter specifications in key: value format, one per line or in paragraph form"></textarea>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="closeModal('productModal')">Cancel</button>
            <button type="submit" class="btn btn-primary" id="productSubmitBtn">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="../sheets-api.js"></script>
  <script src="js/admin-app.js"></script>
</body>
</html>
