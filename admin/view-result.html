<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Result - Canvas+2 College of Management</title>
  <link rel="icon" href="../assets/images/logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <script>if ((localStorage.getItem('adminTheme') || 'light') === 'dark') document.documentElement.classList.add('dark');</script>
  <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-firestore.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    .card-header-bg { background: linear-gradient(135deg, #1a3c6d 0%, #1f4d8c 60%, #15325a 100%); }
    .print-btn-bar { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:16px; }
    .watermark-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-30deg); font-size:4rem; font-weight:900; color:rgba(26,60,109,0.06); font-family:Georgia,serif; letter-spacing:8px; pointer-events:none; z-index:999; white-space:nowrap; width:100%; text-align:center; }

    .result-card {
      position:relative;
      border:1px solid #b0b8c4 !important;
      box-shadow:0 0 0 3px #1a3c6d, 0 4px 24px rgba(0,0,0,0.06) !important;
    }

    @media print {
      body { background:#fff !important; }
      body.admin-body { display:block !important; }
      .sidebar, .admin-header, .page-content > .panel:first-child, .print-btn-bar, .btn, .toast-container,
      .sidebar-overlay, #toastContainer, .mobile-toggle { display:none !important; }
      .main-content { margin-left:0 !important; padding:0 !important; width:100% !important; }
      .page-content { padding:0 !important; max-width:100% !important; }
      #resultDisplay { display:block !important; margin:0 auto !important; }
      #resultDisplay .result-card {
        box-shadow:0 0 0 3px #1a3c6d, 0 0 0 6px #b0b8c4 !important;
        border:none !important;
        border-radius:0 !important;
        page-break-inside:avoid !important;
      }
      #resultDisplay .watermark-text { display:block !important; }
      @page { size:A4; margin:14mm; }
    }
  </style>
</head>
<body class="admin-body">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"><img src="../assets/images/logo.png" alt="Canvas+2"></div>
      <div class="sidebar-logo-text">
        <span>Canvas+2 College of Management</span>
        <small>Admin Panel</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="sidebar-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="users.html" class="sidebar-link"><i class="fas fa-users"></i> Users</a>
      <a href="team.html" class="sidebar-link"><i class="fas fa-user-friends"></i> Team</a>
      <a href="slider.html" class="sidebar-link"><i class="fas fa-images"></i> Slider</a>
      <a href="sheet.html" class="sidebar-link"><i class="fas fa-file-alt"></i> Sheet</a>
      <a href="file-manager.html" class="sidebar-link"><i class="fas fa-folder-open"></i> File Manager</a>
      <span class="sidebar-nav-label">Results</span>
      <a href="view-result.html" class="sidebar-link active"><i class="fas fa-file-invoice"></i> View Result</a>
      <a href="results.html" class="sidebar-link"><i class="fas fa-cog"></i> Manage Sheets</a>
    </nav>
    <a href="../index.html" class="sidebar-link" target="_blank"><i class="fas fa-external-link-alt"></i> Visit Website</a>
    <div class="sidebar-footer">
      <button class="sidebar-link" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Sign out</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="admin-header">
      <div class="header-left">
        <button class="header-btn mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h1>View Result</h1>
      </div>
      <div class="header-right">
        <button class="header-btn" onclick="toggleAdminTheme()" title="Toggle theme"><i class="fas fa-moon"></i></button>
        <div class="admin-avatar" id="adminAvatar">A</div>
      </div>
    </header>

    <div class="page-content">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title"><i class="fas fa-search"></i> Search Student Result</span>
        </div>
        <div class="panel-body">
          <div style="max-width:520px;margin:0 auto;">
            <div class="form-group">
              <label for="resultSheet"><i class="fas fa-file-alt"></i> Select Result Sheet</label>
              <select id="resultSheet" class="form-control">
                <option value="">-- Select Result Sheet --</option>
              </select>
            </div>
            <div class="form-group">
              <label for="symbolNumber"><i class="fas fa-hashtag"></i> Symbol Number</label>
              <div style="display:flex;gap:8px;">
                <input type="text" id="symbolNumber" class="form-control" placeholder="Enter symbol number" autocomplete="off" style="flex:1;" onkeydown="if(event.key==='Enter')searchResult()">
                <button class="btn btn-primary" onclick="searchResult()"><i class="fas fa-search"></i> Search</button>
              </div>
            </div>
            <div id="searchStatus" style="font-size:13px;color:var(--color-fg-muted);"></div>
          </div>
        </div>
      </div>

      <div id="resultDisplay"></div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/sheets-service.js"></script>
  <script src="../assets/js/subject-utils.js"></script>
  <script src="../assets/js/admin/admin.js"></script>
  <script>
    var _sheetsTabMap = {};

    async function loadPublishedSheets() {
      var select = document.getElementById('resultSheet');
      try {
        var snap = await db.collection('resultSheets').where('published', '==', true).get();
        if (snap.empty) { select.innerHTML = '<option value="">-- No published sheets --</option>'; return; }
        var opts = '<option value="">-- Select Result Sheet --</option>';
        snap.forEach(function (doc) {
          var d = doc.data();
          _sheetsTabMap[doc.id] = d.tabName || d.name;
          opts += '<option value="' + doc.id + '">' + d.name + '</option>';
        });
        select.innerHTML = opts;
      } catch (e) { select.innerHTML = '<option value="">-- Error loading sheets --</option>'; }
    }

    var _subjectNames = {
      'English': { full: 'Compulsory English', short: 'ENG' },
      'Nepali': { full: 'Compulsory Nepali', short: 'NEP' },
      'Social': { full: 'Social Studies', short: 'SOC' },
      'BasicMath': { full: 'Basic Mathematics', short: 'B.MATH' },
      'Economics': { full: 'Economics', short: 'ECO' },
      'Account': { full: 'Accountancy', short: 'ACC' },
      'BusinessStudies': { full: 'Business Studies', short: 'BS' },
      'ComputerScience': { full: 'Computer Science', short: 'CS' },
      'HotelManagement': { full: 'Hotel Management', short: 'HM' },
      'BusinessMath': { full: 'Business Mathematics', short: 'BM' }
    };

    function getSubjectLabel(raw) {
      var canon = typeof SubjectUtils !== 'undefined' && SubjectUtils.match ? SubjectUtils.match(raw) : null;
      if (!canon) return raw;
      var info = _subjectNames[canon];
      return info ? info.full : canon;
    }

    function getShortLabel(raw) {
      var canon = typeof SubjectUtils !== 'undefined' && SubjectUtils.match ? SubjectUtils.match(raw) : null;
      if (!canon) return raw;
      var info = _subjectNames[canon];
      return info ? info.short : canon;
    }

    function printGradesheet() {
      var card = document.querySelector('#resultDisplay .result-card');
      if (!card) { window.print(); return; }
      var wm = document.createElement('div');
      wm.className = 'watermark-text';
      wm.textContent = 'Canvas+2';
      card.style.position = 'relative';
      card.appendChild(wm);
      setTimeout(function () {
        window.print();
        setTimeout(function () { if (wm.parentNode) wm.parentNode.removeChild(wm); }, 300);
      }, 200);
    }

    async function downloadResult(format) {
      var card = document.querySelector('#resultDisplay .result-card');
      if (!card) return;
      var wm = document.createElement('div');
      wm.className = 'watermark-text';
      wm.textContent = 'Canvas+2';
      card.style.position = 'relative';
      card.appendChild(wm);
      try {
        var canvas = await html2canvas(card, { scale: 3, backgroundColor: '#ffffff', allowTaint: false, useCORS: true, logging: false });
        if (format === 'png') {
          var link = document.createElement('a'); link.download = 'gradesheet.png'; link.href = canvas.toDataURL('image/png'); link.click();
        } else if (format === 'pdf') {
          var imgData = canvas.toDataURL('image/png');
          var pdf = new window.jspdf.jsPDF({ orientation: canvas.width > canvas.height ? 'l' : 'p', unit: 'mm', format: 'a4' });
          var pw = pdf.internal.pageSize.getWidth();
          var ph = (canvas.height * pw) / canvas.width;
          pdf.addImage(imgData, 'PNG', 0, 0, pw, ph);
          pdf.save('gradesheet.pdf');
        }
      } catch (e) { showToast('Download failed: ' + e.message, 'error'); }
      if (wm.parentNode) wm.parentNode.removeChild(wm);
    }

    async function searchResult() {
      var sheetId = document.getElementById('resultSheet').value;
      var symbol = document.getElementById('symbolNumber').value.trim();
      var display = document.getElementById('resultDisplay');
      var status = document.getElementById('searchStatus');

      if (!sheetId) { status.innerHTML = '<span style="color:var(--color-danger-fg);"><i class="fas fa-exclamation-circle"></i> Select a result sheet.</span>'; return; }
      if (!symbol) { status.innerHTML = '<span style="color:var(--color-danger-fg);"><i class="fas fa-exclamation-circle"></i> Enter a symbol number.</span>'; return; }

      status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Searching...';
      display.innerHTML = '';

      try {
        var doc = await db.collection('resultSheets').doc(sheetId).get();
        if (!doc.exists) { status.innerHTML = '<span style="color:var(--color-danger-fg);"><i class="fas fa-exclamation-circle"></i> Sheet not found.</span>'; return; }
        var sheet = doc.data();
        var webUrl = sheet.webUrl;
        if (!webUrl) { status.innerHTML = '<span style="color:var(--color-fg-muted);"><i class="fas fa-info-circle"></i> No web URL configured.</span>'; return; }
        sheetsService.setWebAppUrl(webUrl);
        var tabName = sheet.tabName || sheet.name;
        var result = await sheetsService.fetchResult(tabName, symbol, sheet.sheetId);
        status.innerHTML = '<span style="color:var(--color-success-emphasis);"><i class="fas fa-check-circle"></i> Result found!</span>';

        var nameKey = Object.keys(result).find(function(k){return /name|student/i.test(k)&&!/TH|PR/i.test(k);})||'';
        var studentName = result[nameKey]||'';

        var subjectRows = [];
        var skipKeys = Object.keys(result).filter(function(k){return /symbol|name|total|percentage|gpa|grade|result|sn|s\.n|^$/i.test(k);});
        var detected = {};
        Object.keys(result).forEach(function(k){
          var t=String(k).trim();
          if(/ TH$/i.test(t)){var s=t.replace(/ TH$/i,'').trim();if(!detected[s])detected[s]={};detected[s].thKey=k;}
          if(/ PR$/i.test(t)){var s=t.replace(/ PR$/i,'').trim();if(!detected[s])detected[s]={};detected[s].prKey=k;}
        });
        var hasThPr = Object.keys(detected).some(function(s){return detected[s].thKey||detected[s].prKey;});
        if(!hasThPr){Object.keys(result).forEach(function(k){if(skipKeys.indexOf(k)>=0)return;if(!detected[k])detected[k]={totalKey:k};});}

        Object.keys(detected).forEach(function(subj){
          var thVal,prVal,subjTotal,isCombined=false;
          if(detected[subj].totalKey){
            isCombined=true;
            var v=result[detected[subj].totalKey];
            subjTotal=(v!==undefined&&v!==null&&v!=='')?Number(v):'';
            thVal='';prVal='';
          }else{
            var th=detected[subj].thKey?result[detected[subj].thKey]:undefined;
            var pr=detected[subj].prKey?result[detected[subj].prKey]:undefined;
            thVal=(th!==undefined&&th!==null&&th!=='')?th:'';
            prVal=(pr!==undefined&&pr!==null&&pr!=='')?pr:'';
            if(thVal===''&&prVal==='')return;
            subjTotal=(thVal!==''&&prVal!=='')?Number(thVal)+Number(prVal):(thVal!==''?Number(thVal):'');
          }
          if(isCombined&&subjTotal==='')return;
          var gp='',gr='';
          if(subjTotal!==''&&!isNaN(subjTotal)){
            var t=Number(subjTotal);
            gp=t>=90?'4.0':t>=80?'3.6':t>=70?'3.2':t>=60?'2.8':t>=50?'2.4':t>=40?'2.0':t>=35?'1.6':'0';
            gr=t>=90?'A+':t>=80?'A':t>=70?'B+':t>=60?'C+':t>=50?'C':t>=40?'D+':t>=35?'D':'NG';
            if(!isCombined&&(Number(thVal)<27||(prVal!==''&&Number(prVal)<10)||t<35)){gp='0';gr='NG';}
            if(isCombined&&t<35){gp='0';gr='NG';}
          }
          subjectRows.push({raw:subj,label:getSubjectLabel(subj),short:getShortLabel(subj),th:thVal,pr:prVal,total:subjTotal,gp:gp,grade:gr});
        });

        var total=result['TOTAL']||result['Total']||'';
        var percentage=result['PERCENTAGE']||result['Percentage']||'';
        var gpa=result['GPA']||result['Gpa']||'';
        var grade=result['GRADE']||result['Grade']||result['Result']||'';
        var isNg=grade==='NG';

        var h = [];
        h.push('<div class="result-card" style="max-width:820px;margin:0 auto;background:#fff;border-radius:8px;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',Helvetica,Arial,sans-serif;">');

        /* ── HEADER ── */
        h.push('<div class="card-header-bg" style="padding:28px 32px 20px;text-align:center;">');
        h.push('<div style="display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px;">');
        h.push('<img src="../assets/images/logo.png" alt="" style="width:48px;height:48px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);object-fit:contain;background:#fff;padding:4px;">');
        h.push('<div style="text-align:left;"><h1 style="margin:0;font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.3px;">Canvas+2 College of Management</h1><p style="margin:2px 0 0;font-size:12px;color:rgba(255,255,255,0.8);">Triyuga-11, Gaighat, Udayapur, Nepal</p></div>');
        h.push('</div>');
        h.push('<div style="border-top:1px solid rgba(255,255,255,0.2);padding-top:10px;">');
        h.push('<span style="display:inline-block;background:rgba(255,255,255,0.15);padding:4px 24px;border-radius:20px;font-size:13px;font-weight:700;color:#fff;letter-spacing:2px;text-transform:uppercase;">Academic Grade Sheet</span>');
        h.push('</div></div>');

        /* ── INFO BAR ── */
        h.push('<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 28px;background:#f8fafc;border-bottom:1px solid #e2e8f0;">');
        h.push('<div><span style="display:inline-block;padding:3px 12px;background:#1a3c6d;color:#fff;border-radius:4px;font-size:11px;font-weight:600;margin-right:8px;">SYMBOL NO</span><span style="font-weight:700;color:#1f2328;font-size:15px;">' + symbol + '</span></div>');
        h.push('<div><span style="display:inline-block;padding:3px 12px;background:#1a3c6d;color:#fff;border-radius:4px;font-size:11px;font-weight:600;margin-right:8px;">STUDENT NAME</span><span style="font-weight:600;color:#1f2328;font-size:15px;">' + (studentName||'—') + '</span></div>');
        h.push('</div>');

        /* ── TABLE ── */
        h.push('<div style="padding:16px 20px;">');
        h.push('<table style="width:100%;border-collapse:collapse;font-size:13px;">');
        h.push('<thead><tr style="background:#1a3c6d;color:#fff;">');
        h.push('<th style="padding:8px 6px;text-align:center;width:34px;font-size:11px;font-weight:600;">S.N.</th>');
        h.push('<th style="padding:8px 10px;text-align:left;font-size:11px;font-weight:600;">Subject</th>');
        h.push('<th style="padding:8px 6px;text-align:center;width:38px;font-size:11px;font-weight:600;">TH</th>');
        h.push('<th style="padding:8px 6px;text-align:center;width:38px;font-size:11px;font-weight:600;">PR</th>');
        h.push('<th style="padding:8px 6px;text-align:center;width:50px;font-size:11px;font-weight:600;">Total</th>');
        h.push('<th style="padding:8px 6px;text-align:center;width:40px;font-size:11px;font-weight:600;">GP</th>');
        h.push('<th style="padding:8px 6px;text-align:center;width:52px;font-size:11px;font-weight:600;">Grade</th></tr></thead><tbody>');

        subjectRows.forEach(function(row,i){
          var rNg=row.grade==='NG';
          h.push('<tr style="border-bottom:1px solid #e2e8f0;">');
          h.push('<td style="padding:7px 4px;text-align:center;color:#656d76;font-size:12px;">'+(i+1)+'</td>');
          h.push('<td style="padding:7px 10px;font-weight:500;color:#1f2328;">'+row.label+'</td>');
          h.push('<td style="padding:7px 4px;text-align:center;color:#656d76;">'+(row.th!==''?row.th:'-')+'</td>');
          h.push('<td style="padding:7px 4px;text-align:center;color:#656d76;">'+(row.pr!==''?row.pr:'-')+'</td>');
          h.push('<td style="padding:7px 4px;text-align:center;font-weight:600;'+(rNg?'color:#cf222e;':'color:#1f2328;')+'">'+(row.total!==''?row.total:'-')+'</td>');
          h.push('<td style="padding:7px 4px;text-align:center;'+(rNg?'color:#cf222e;font-weight:600;':'color:#656d76;')+'">'+row.gp+'</td>');
          var gc=rNg?'#cf222e':row.grade==='A+'||row.grade==='A'?'#1a7f37':'#1f2328';
          h.push('<td style="padding:7px 4px;text-align:center;font-weight:700;color:'+gc+';">'+row.grade+'</td></tr>');
        });

        var tTH=0,tPR=0,tSum=0,hTH=false,hPR=false;
        subjectRows.forEach(function(r){if(r.th!==''&&!isNaN(Number(r.th))){tTH+=Number(r.th);hTH=true;}if(r.pr!==''&&!isNaN(Number(r.pr))){tPR+=Number(r.pr);hPR=true;}if(r.total!==''&&!isNaN(Number(r.total)))tSum+=Number(r.total);});
        h.push('</tbody><tfoot><tr style="background:#f8fafc;font-weight:700;border-top:2px solid #1a3c6d;">');
        h.push('<td style="padding:8px 4px;text-align:center;"></td><td style="padding:8px 10px;font-size:12px;color:#656d76;">GRAND TOTAL</td>');
        h.push('<td style="padding:8px 4px;text-align:center;">'+(hTH?tTH:'')+'</td>');
        h.push('<td style="padding:8px 4px;text-align:center;">'+(hPR?tPR:'')+'</td>');
        h.push('<td style="padding:8px 4px;text-align:center;font-size:15px;color:#1a3c6d;">'+tSum+'</td>');
        h.push('<td></td><td></td></tr></tfoot></table></div>');

        /* ── SUMMARY ── */
        h.push('<div style="display:flex;justify-content:center;flex-wrap:wrap;gap:0;padding:12px 24px;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;background:#f8fafc;">');
        if(total!=='')h.push('<div style="padding:8px 24px;border-right:1px solid #e2e8f0;text-align:center;"><div style="font-size:10px;text-transform:uppercase;color:#656d76;letter-spacing:1px;margin-bottom:2px;">Total</div><div style="font-size:18px;font-weight:700;color:#1f2328;">'+total+'</div></div>');
        if(percentage!=='')h.push('<div style="padding:8px 24px;border-right:1px solid #e2e8f0;text-align:center;"><div style="font-size:10px;text-transform:uppercase;color:#656d76;letter-spacing:1px;margin-bottom:2px;">Percentage</div><div style="font-size:18px;font-weight:700;color:#1f2328;">'+percentage+'</div></div>');
        if(gpa!=='')h.push('<div style="padding:8px 24px;border-right:1px solid #e2e8f0;text-align:center;"><div style="font-size:10px;text-transform:uppercase;color:#656d76;letter-spacing:1px;margin-bottom:2px;">GPA</div><div style="font-size:22px;font-weight:800;'+(isNg?'color:#cf222e;':'color:#1a3c6d;')+'">'+gpa+'</div></div>');
        if(grade!=='')h.push('<div style="padding:8px 24px;text-align:center;"><div style="font-size:10px;text-transform:uppercase;color:#656d76;letter-spacing:1px;margin-bottom:2px;">Grade</div><div style="font-size:22px;font-weight:800;'+(isNg?'color:#cf222e;':'color:#1a3c6d;')+'">'+grade+'</div></div>');
        h.push('</div>');

        /* ── SIGNATURES ── */
        h.push('<div style="display:flex;justify-content:space-between;padding:20px 40px 16px;">');
        h.push('<div style="text-align:center;"><div style="width:160px;border-top:1px solid #656d76;margin:0 auto 4px;"></div><div style="font-size:11px;color:#656d76;">Exam Controller</div></div>');
        h.push('<div style="text-align:center;"><div style="width:160px;border-top:1px solid #656d76;margin:0 auto 4px;"></div><div style="font-size:11px;color:#656d76;">Principal</div></div>');
        h.push('<div style="text-align:center;"><div style="width:160px;border-top:1px solid #656d76;margin:0 auto 4px;"></div><div style="font-size:11px;color:#656d76;">College Seal</div></div>');
        h.push('</div>');

        /* ── FOOTER ── */
        h.push('<div style="padding:8px 20px;text-align:center;font-size:10px;color:#8c959f;border-top:1px solid #e2e8f0;">Canvas+2 College of Management &bull; Triyuga-11, Gaighat, Udayapur, Nepal &bull; ' + sheet.name + '</div>');
        h.push('</div>');

        /* ── ACTION BUTTONS ── */
        h.push('<div class="print-btn-bar">');
        h.push('<button class="btn btn-secondary btn-sm" onclick="downloadResult(\'png\')"><i class="fas fa-image"></i> PNG</button>');
        h.push('<button class="btn btn-secondary btn-sm" onclick="downloadResult(\'pdf\')"><i class="fas fa-file-pdf"></i> PDF</button>');
        h.push('<button class="btn btn-primary btn-sm" onclick="printGradesheet()"><i class="fas fa-print"></i> Print</button>');
        h.push('</div>');

        display.innerHTML = h.join('');
      } catch (e) {
        status.innerHTML = '<span style="color:var(--color-danger-fg);"><i class="fas fa-exclamation-circle"></i> ' + (e.message || 'Result not found.') + '</span>';
        display.innerHTML = '';
      }
    }

    document.addEventListener('DOMContentLoaded', function () { loadPublishedSheets(); });
  </script>
</body>
</html>
