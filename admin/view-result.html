<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Result - Canvas+2 College of Management</title>
  <link rel="icon" href="../assets/images/logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <script>if ((localStorage.getItem('adminTheme') || 'light') === 'dark') document.documentElement.classList.add('dark');</script>
  <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-firestore.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    .watermark-logo {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%) rotate(-20deg);
      width:220px; height:220px;
      opacity:0.04; pointer-events:none; z-index:9;
      object-fit:contain;
    }
    .gs { font-family:'Segoe UI',Helvetica,Arial,sans-serif; }
    .gs table { width:100%; border-collapse:collapse; }
    .gs table th { background:#f4f6f8; color:#1f2328; padding:8px 14px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; text-align:center; border-bottom:2px solid #1a3c6d; }
    .gs table th:first-child { text-align:left; }
    .gs table td { padding:7px 14px; border-bottom:1px solid #d8dee4; text-align:center; font-size:13px; }
    .gs table td:first-child { text-align:left; font-weight:500; color:#1f2328; }
    .gs table tbody tr:last-child td { border-bottom:1px solid #bac0c8; }
    .sig-line { width:140px; border-top:2px solid #1a3c6d; margin:0 auto 6px; }
    .no-print { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:16px; }
    @media print {
      body { background:#fff !important; margin:0 !important; padding:0 !important; }
      body.admin-body { display:block !important; }
      .sidebar, .admin-header, .page-content > .panel:first-child, .toast-container,
      .sidebar-overlay, #toastContainer, .mobile-toggle, .modal-overlay, .no-print { display:none !important; }
      .main-content {
        margin:10mm 0 !important; padding:0 !important; width:100% !important;
        height:calc(100vh - 20mm) !important; box-sizing:border-box !important;
        border:6px solid #1a3c6d !important;
        outline:2px solid #b0b8c4 !important;
        outline-offset:-8px !important;
        -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important;
      }
      .page-content { padding:0 !important; max-width:100% !important; height:100% !important; }
      #resultDisplay {
        display:block !important; margin:0 !important; padding:0 !important;
        height:100% !important;
      }
      #resultDisplay .gs {
        width:100% !important; max-width:none !important; margin:0 !important;
        height:100% !important; box-sizing:border-box !important;
        display:flex !important; flex-direction:column !important;
        padding-bottom:35mm !important;
        border:none !important; border-radius:0 !important;
      }
      #resultDisplay .gs-content { flex:1 !important; }
      .watermark-logo { display:block !important; }
      @page { size:A4; margin:0; }
    }
  </style>
</head>
<body class="admin-body">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"><img src="../assets/images/logo.png" alt="Canvas+2"></div>
      <div class="sidebar-logo-text">
        <span>Canvas+2 College of Management</span>
        <small>Admin Panel</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="sidebar-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="users.html" class="sidebar-link"><i class="fas fa-users"></i> Users</a>
      <a href="team.html" class="sidebar-link"><i class="fas fa-user-friends"></i> Team</a>
      <a href="slider.html" class="sidebar-link"><i class="fas fa-images"></i> Slider</a>
      <a href="sheet.html" class="sidebar-link"><i class="fas fa-file-alt"></i> Sheet</a>
      <a href="file-manager.html" class="sidebar-link"><i class="fas fa-folder-open"></i> File Manager</a>
      <span class="sidebar-nav-label">Results</span>
      <a href="view-result.html" class="sidebar-link active"><i class="fas fa-file-invoice"></i> View Result</a>
      <a href="results.html" class="sidebar-link"><i class="fas fa-cog"></i> Manage Sheets</a>
    </nav>
    <a href="../index.html" class="sidebar-link" target="_blank"><i class="fas fa-external-link-alt"></i> Visit Website</a>
    <div class="sidebar-footer">
      <button class="sidebar-link" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Sign out</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="admin-header">
      <div class="header-left">
        <button class="header-btn mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h1>View Result</h1>
      </div>
      <div class="header-right">
        <button class="header-btn" onclick="toggleAdminTheme()" title="Toggle theme"><i class="fas fa-moon"></i></button>
        <div class="admin-avatar" id="adminAvatar">A</div>
      </div>
    </header>

    <div class="page-content">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title"><i class="fas fa-search"></i> Search Student Result</span>
        </div>
        <div class="panel-body">
          <div style="max-width:520px;margin:0 auto;">
            <div class="form-group">
              <label for="resultSheet"><i class="fas fa-file-alt"></i> Select Result Sheet</label>
              <select id="resultSheet" class="form-control">
                <option value="">-- Select Result Sheet --</option>
              </select>
            </div>
            <div class="form-group">
              <label for="symbolNumber"><i class="fas fa-hashtag"></i> Symbol Number</label>
              <div style="display:flex;gap:8px;">
                <input type="text" id="symbolNumber" class="form-control" placeholder="Enter symbol number" autocomplete="off" style="flex:1;" onkeydown="if(event.key==='Enter')searchResult()">
                <button class="btn btn-primary" onclick="searchResult()"><i class="fas fa-search"></i> Search</button>
              </div>
            </div>
            <div id="searchStatus" style="font-size:13px;color:var(--color-fg-muted);"></div>
          </div>
        </div>
      </div>

      <div id="resultDisplay"></div>
    </div>
  </div>

  <div class="modal-overlay" id="classModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <span class="modal-title">Select Class</span>
        <button class="modal-close" onclick="closeClassModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="classSelect"><i class="fas fa-graduation-cap"></i> Class</label>
          <select id="classSelect" class="form-control" onchange="toggleClassCustom()">
            <option value="11">11</option>
            <option value="12" selected>12</option>
            <option value="__custom__">Custom</option>
          </select>
        </div>
        <div class="form-group" id="classCustomGroup" style="display:none;">
          <label for="classCustom"><i class="fas fa-pen"></i> Custom Class</label>
          <input type="text" id="classCustom" class="form-control" placeholder="e.g. Class 12 Science">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeClassModal()">Cancel</button>
        <button class="btn btn-primary" onclick="proceedWithClass()">Continue</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/sheets-service.js"></script>
  <script src="../assets/js/subject-utils.js"></script>
  <script src="../assets/js/admin/admin.js"></script>
  <script>
    var _sheetsTabMap = {};
    var _pendingAction = null;
    var _resultData = null;
    var _sheetName = '';

    async function loadPublishedSheets() {
      var select = document.getElementById('resultSheet');
      try {
        var snap = await db.collection('resultSheets').where('published', '==', true).get();
        if (snap.empty) { select.innerHTML = '<option value="">-- No published sheets --</option>'; return; }
        var opts = '<option value="">-- Select Result Sheet --</option>';
        snap.forEach(function (doc) {
          var d = doc.data();
          _sheetsTabMap[doc.id] = d.tabName || d.name;
          opts += '<option value="' + doc.id + '">' + d.name + '</option>';
        });
        select.innerHTML = opts;
      } catch (e) { select.innerHTML = '<option value="">-- Error loading sheets --</option>'; }
    }

    var _subjectNames = {
      'English': { full: 'Compulsory English', short: 'ENG' },
      'Nepali': { full: 'Compulsory Nepali', short: 'NEP' },
      'Social': { full: 'Social Studies', short: 'SOC' },
      'BasicMath': { full: 'Basic Mathematics', short: 'B.MATH' },
      'Economics': { full: 'Economics', short: 'ECO' },
      'Account': { full: 'Accountancy', short: 'ACC' },
      'BusinessStudies': { full: 'Business Studies', short: 'BS' },
      'ComputerScience': { full: 'Computer Science', short: 'CS' },
      'HotelManagement': { full: 'Hotel Management', short: 'HM' },
      'BusinessMath': { full: 'Business Mathematics', short: 'BM' }
    };

    function getSubjectLabel(raw) {
      var canon = typeof SubjectUtils !== 'undefined' && SubjectUtils.match ? SubjectUtils.match(raw) : null;
      if (!canon) return raw;
      var info = _subjectNames[canon];
      return info ? info.full : canon;
    }

    function toggleClassCustom() {
      document.getElementById('classCustomGroup').style.display = document.getElementById('classSelect').value === '__custom__' ? '' : 'none';
    }

    function closeClassModal() {
      document.getElementById('classModal').classList.remove('open');
      _pendingAction = null;
    }

    function showClassModal(action) {
      _pendingAction = action;
      document.getElementById('classModal').classList.add('open');
    }

    function getSelectedClass() {
      var sel = document.getElementById('classSelect').value;
      if (sel === '__custom__') return document.getElementById('classCustom').value.trim() || '12';
      return sel;
    }

    function proceedWithClass() {
      var cls = getSelectedClass();
      var action = _pendingAction;
      closeClassModal();
      if (action === 'print') doPrint(cls);
      else if (action === 'png') doDownload('png', cls);
      else if (action === 'pdf') doDownload('pdf', cls);
    }

    function printGradesheet() {
      if (!document.querySelector('#resultDisplay .gs')) return;
      showClassModal('print');
    }

    function downloadResult(format) {
      if (!document.querySelector('#resultDisplay .gs')) return;
      showClassModal(format);
    }

    function gradeColor(g) {
      if (g === 'NG') return '#cf222e';
      return '#1a3c6d';
    }

    function buildGradesheet(symbol, studentName, subjectRows, gpa, grade, sheetName, cls) {
      var isNg = grade === 'NG';
      var h = [];
      h.push('<div class="gs" style="max-width:780px;margin:24px auto 0;background:#fff;border:1px solid #bac0c8;position:relative;">');

      h.push('<div style="display:flex;align-items:center;gap:16px;padding:22px 28px 14px;border-bottom:1px solid #d0d7de;">');
      h.push('<img src="../assets/images/logo.png" alt="" style="width:52px;height:52px;object-fit:contain;border:1px solid #d0d7de;padding:4px;">');
      h.push('<div><div style="font-size:17px;font-weight:800;color:#1a3c6d;">Canvas+2 College of Management</div><div style="font-size:12px;color:#656d76;">Triyuga-11, Gaighat, Udayapur, Nepal</div></div>');
      h.push('</div>');

      h.push('<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 28px;background:#f8fafc;border-bottom:1px solid #d0d7de;">');
      h.push('<div style="font-size:13px;font-weight:700;color:#1a3c6d;letter-spacing:1.2px;text-transform:uppercase;">Statement of Grades</div>');
      h.push('<div style="display:flex;gap:18px;font-size:13px;color:#1f2328;">');
      if (cls) h.push('<span><span style="font-weight:600;">Class:</span> ' + cls + '</span>');
      else if (sheetName) h.push('<span><span style="font-weight:600;">Exam:</span> ' + sheetName + '</span>');
      h.push('</div></div>');

      h.push('<div style="display:flex;justify-content:space-between;padding:10px 28px;border-bottom:1px solid #d0d7de;font-size:14px;">');
      h.push('<div><span style="font-weight:600;color:#1a3c6d;">Symbol No:</span> ' + symbol + '</div>');
      h.push('<div><span style="font-weight:600;color:#1a3c6d;">Student Name:</span> ' + (studentName||'—') + '</div>');
      h.push('</div>');

      h.push('<div class="gs-content">');

      if (subjectRows.length) {
        h.push('<table><thead><tr><th>Subject</th><th style="width:80px;">Grade</th><th style="width:100px;">Grade Point</th></tr></thead><tbody>');
        subjectRows.forEach(function(row){
          var gp = row.grade === 'A+' ? 4.0 : row.grade === 'A' ? 3.6 : row.grade === 'B+' ? 3.2 : row.grade === 'C+' ? 2.8 : row.grade === 'C' ? 2.4 : row.grade === 'D+' ? 2.0 : row.grade === 'D' ? 1.6 : 0.0;
          h.push('<tr><td>' + row.label + '</td><td style="font-weight:700;color:' + gradeColor(row.grade) + ';">' + row.grade + '</td><td style="font-weight:600;">' + (row.grade === 'NG' ? '0.0' : gp.toFixed(1)) + '</td></tr>');
        });
        h.push('</tbody></table>');
      }

      h.push('<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 28px;border-top:2px solid #1a3c6d;border-bottom:1px solid #d0d7de;">');
      h.push('<div><div style="font-size:11px;text-transform:uppercase;color:#656d76;letter-spacing:1.2px;">GPA</div><div style="font-size:22px;font-weight:800;color:' + (isNg ? '#cf222e' : '#1a3c6d') + ';line-height:1.2;">' + (gpa || '—') + '</div></div>');
      h.push('<div style="text-align:right;"><div style="font-size:11px;text-transform:uppercase;color:#656d76;letter-spacing:1.2px;">Overall Grade</div><div style="font-size:22px;font-weight:800;color:' + (isNg ? '#cf222e' : '#1a3c6d') + ';">' + (grade || '—') + '</div></div>');
      h.push('</div>');

      h.push('</div>');

      h.push('<div style="display:flex;justify-content:space-around;padding:18px 40px 22px;">');
      h.push('<div style="text-align:center;"><div class="sig-line"></div><div style="font-size:12px;color:#656d76;">Exam Controller</div></div>');
      h.push('<div style="text-align:center;"><div class="sig-line"></div><div style="font-size:12px;color:#656d76;">Principal</div></div>');
      h.push('</div>');

      h.push('</div>');

      h.push('<div class="no-print">');
      h.push('<button class="btn btn-secondary btn-sm" onclick="downloadResult(\'png\')"><i class="fas fa-image"></i> PNG</button>');
      h.push('<button class="btn btn-secondary btn-sm" onclick="downloadResult(\'pdf\')"><i class="fas fa-file-pdf"></i> PDF</button>');
      h.push('<button class="btn btn-primary btn-sm" onclick="printGradesheet()"><i class="fas fa-print"></i> Print</button>');
      h.push('</div>');

      return h.join('');
    }

    async function searchResult() {
      var sheetId = document.getElementById('resultSheet').value;
      var symbol = document.getElementById('symbolNumber').value.trim();
      var display = document.getElementById('resultDisplay');
      var status = document.getElementById('searchStatus');

      if (!sheetId) { status.innerHTML = '<span style="color:var(--color-danger-fg);"><i class="fas fa-exclamation-circle"></i> Select a result sheet.</span>'; return; }
      if (!symbol) { status.innerHTML = '<span style="color:var(--color-danger-fg);"><i class="fas fa-exclamation-circle"></i> Enter a symbol number.</span>'; return; }

      status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Searching...';
      display.innerHTML = '';

      try {
        var doc = await db.collection('resultSheets').doc(sheetId).get();
        if (!doc.exists) { status.innerHTML = '<span style="color:var(--color-danger-fg);"><i class="fas fa-exclamation-circle"></i> Sheet not found.</span>'; return; }
        var sheet = doc.data();
        var webUrl = sheet.webUrl;
        if (!webUrl) { status.innerHTML = '<span style="color:var(--color-fg-muted);"><i class="fas fa-info-circle"></i> No web URL configured.</span>'; return; }
        sheetsService.setWebAppUrl(webUrl);
        var tabName = sheet.tabName || sheet.name;
        var result = await sheetsService.fetchResult(tabName, symbol, sheet.sheetId);
        status.innerHTML = '<span style="color:var(--color-success-emphasis);"><i class="fas fa-check-circle"></i> Result found!</span>';

        _sheetName = sheet.name;
        _resultData = { result: result, symbol: symbol };

        var nameKey = Object.keys(result).find(function(k){return /name|student/i.test(k)&&!/TH|PR/i.test(k);})||'';
        var studentName = result[nameKey]||'';

        var subjectRows = [];
        var skipKeys = Object.keys(result).filter(function(k){return /symbol|name|total|percentage|gpa|grade|result|sn|s\.n|^$/i.test(k);});
        var detected = {};
        Object.keys(result).forEach(function(k){
          var t=String(k).trim();
          if(/ TH$/i.test(t)){var s=t.replace(/ TH$/i,'').trim();if(!detected[s])detected[s]={};detected[s].thKey=k;}
          if(/ PR$/i.test(t)){var s=t.replace(/ PR$/i,'').trim();if(!detected[s])detected[s]={};detected[s].prKey=k;}
        });
        var hasThPr = Object.keys(detected).some(function(s){return detected[s].thKey||detected[s].prKey;});
        if(!hasThPr){Object.keys(result).forEach(function(k){if(skipKeys.indexOf(k)>=0)return;if(!detected[k])detected[k]={totalKey:k};});}

        Object.keys(detected).forEach(function(subj){
          var thVal,prVal,subjTotal,isCombined=false;
          if(detected[subj].totalKey){
            isCombined=true;
            var v=result[detected[subj].totalKey];
            subjTotal=(v!==undefined&&v!==null&&v!=='')?Number(v):''; thVal=''; prVal='';
          } else {
            var th=detected[subj].thKey?result[detected[subj].thKey]:undefined;
            var pr=detected[subj].prKey?result[detected[subj].prKey]:undefined;
            thVal=(th!==undefined&&th!==null&&th!=='')?th:'';
            prVal=(pr!==undefined&&pr!==null&&pr!=='')?pr:'';
            if(thVal===''&&prVal==='')return;
            subjTotal=(thVal!==''&&prVal!=='')?Number(thVal)+Number(prVal):(thVal!==''?Number(thVal):'');
          }
          if(isCombined&&subjTotal==='')return;
          var gr='';
          if(subjTotal!==''&&!isNaN(subjTotal)){
            var t=Number(subjTotal);
            gr=t>=90?'A+':t>=80?'A':t>=70?'B+':t>=60?'C+':t>=50?'C':t>=40?'D+':t>=35?'D':'NG';
            if(!isCombined&&(Number(thVal)<27||(prVal!==''&&Number(prVal)<10)||t<35))gr='NG';
            if(isCombined&&t<35)gr='NG';
          }
          subjectRows.push({label:getSubjectLabel(subj),grade:gr||'NG'});
        });

        var gpa=result['GPA']||result['Gpa']||'';
        var grade=result['GRADE']||result['Grade']||result['Result']||'';

        _resultData.studentName = studentName;
        _resultData.subjectRows = subjectRows;
        _resultData.gpa = gpa;
        _resultData.grade = grade;

        display.innerHTML = buildGradesheet(symbol, studentName, subjectRows, gpa, grade, sheet.name, '');
      } catch (e) {
        status.innerHTML = '<span style="color:var(--color-danger-fg);"><i class="fas fa-exclamation-circle"></i> ' + (e.message || 'Result not found.') + '</span>';
        display.innerHTML = '';
      }
    }

    function addWatermark(card) {
      if (card.querySelector('.watermark-logo')) return;
      var wm = document.createElement('img');
      wm.className = 'watermark-logo';
      wm.src = '../assets/images/logo.png';
      wm.alt = '';
      card.style.position = 'relative';
      card.insertBefore(wm, card.firstChild);
    }

    function removeWatermark(card) {
      var wm = card.querySelector('.watermark-logo');
      if (wm) wm.remove();
    }

    function doPrint(cls) {
      var d = _resultData;
      document.getElementById('resultDisplay').innerHTML = buildGradesheet(d.symbol, d.studentName, d.subjectRows, d.gpa, d.grade, _sheetName, cls);
      var card = document.querySelector('#resultDisplay .gs');
      addWatermark(card);
      setTimeout(function(){ window.print(); setTimeout(function(){ removeWatermark(card); }, 300); }, 200);
    }

    async function doDownload(format, cls) {
      var d = _resultData;
      document.getElementById('resultDisplay').innerHTML = buildGradesheet(d.symbol, d.studentName, d.subjectRows, d.gpa, d.grade, _sheetName, cls);
      var card = document.querySelector('#resultDisplay .gs');
      addWatermark(card);
      try {
        var canvas = await html2canvas(card, { scale: 3, backgroundColor: '#ffffff', allowTaint: false, useCORS: true, logging: false });
        if (format === 'png') {
          var link = document.createElement('a'); link.download = 'gradesheet.png'; link.href = canvas.toDataURL('image/png'); link.click();
        } else {
          var imgData = canvas.toDataURL('image/png');
          var pdf = new window.jspdf.jsPDF({ orientation: canvas.width > canvas.height ? 'l' : 'p', unit: 'mm', format: 'a4' });
          var pw = pdf.internal.pageSize.getWidth();
          var ph = (canvas.height * pw) / canvas.width;
          pdf.addImage(imgData, 'PNG', 0, 0, pw, ph);
          pdf.save('gradesheet.pdf');
        }
      } catch (e) { showToast('Download failed: ' + e.message, 'error'); }
      removeWatermark(card);
    }

    document.addEventListener('DOMContentLoaded', function () { loadPublishedSheets(); });
  </script>
</body>
</html>
